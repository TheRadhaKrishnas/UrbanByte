<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanByte - Smart Living, Stronger Community</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Additional login-specific styling */
    .login-container { max-width: 1200px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-header h1 { font-size: 3rem; color: #1F2B4D; margin-bottom: 0.5rem; }
    .login-header .slogan { font-size: 1.2rem; color: #64B8CE; font-weight: 500; }
    .logo { width: 80px; height: 80px; margin: 1rem auto; }
    .role-selector { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
    .role-btn { padding: 0.75rem 2rem; border-radius: 40px; font-size: 1.1rem; font-weight: 600; background: #E9CFC9; color: #1F2B4D; transition: all 0.3s; border: none; cursor: pointer; }
    .role-btn.active { background: #1F2B4D; color: white; }
    .login-register-wrapper { display: flex; gap: 2rem; margin-top: 2rem; }
    .login-box, .register-box { flex: 1; padding: 2rem; background: #F5F7FA; border-radius: 16px; }
    .login-box { border-right: 2px solid #E9CFC9; }
    .login-box h2, .register-box h2 { margin-bottom: 1.5rem; color: #1F2B4D; font-size: 1.8rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; color: #1F2B4D; }
    .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #E9CFC9; border-radius: 8px; font-size: 1rem; }
    .btn { padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 1rem; transition: 0.3s; border: none; cursor: pointer; }
    .btn-primary { background: #1F2B4D; color: white; }
    .btn-primary:hover { background: #64B8CE; }
    .contact-info { text-align: right; margin-top: 2rem; font-size: 0.9rem; color: #666; }
    .divider { display: none; } /* not needed */
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>UrbanByte</h1>
      <div class="slogan">Smart Living, Stronger Community</div>
      <img src="assets/logo.svg" alt="UrbanByte Logo" class="logo">
    </div>

    <!-- Role Selector -->
    <div class="role-selector">
      <button class="role-btn active" data-role="member">Member</button>
      <button class="role-btn" data-role="management">Management</button>
    </div>

    <!-- Login and Register Boxes -->
    <div class="login-register-wrapper">
      <!-- Login Box -->
      <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginCode">Member Code</label>
            <input type="text" id="loginCode" placeholder="e.g., MEM123" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p style="margin-top:1rem; font-size:0.9rem;">Demo: MEM123 / pass (Member) or ADMIN / admin (Management)</p>
      </div>

      <!-- Register Box (Member only) -->
      <div class="register-box">
        <h2>Register</h2>
        <form id="registerForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" required>
          </div>
          <div class="form-group">
            <label>Apartment Name</label>
            <input type="text" id="regApartment" required>
          </div>
          <div class="form-group">
            <label>Flat Number</label>
            <input type="text" id="regFlat" required>
          </div>
          <div class="form-group">
            <label>Member Registration Code</label>
            <input type="text" id="regCode" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="regPhone" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">Register</button>
        </form>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="contact-info">
      📞 +91 98765 43210 | ✉️ support@urbanbyte.com<br>
      Swami Keshavanand Institute of Technology, Jaipur (Demo)
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Role selector highlighting
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
