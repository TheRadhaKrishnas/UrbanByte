<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanByte - Complaint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <div class="sidebar">...</div> <!-- Sidebar same as member-dashboard -->
    <div class="main-content">
      <div class="page-card">
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <h2>Register Complaint</h2>
        <form id="complaintForm" enctype="multipart/form-data">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="complaintTitle" placeholder="e.g., Water leakage" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="complaintDesc" rows="4" placeholder="Describe issue..." required></textarea>
          </div>
          <div class="form-group">
            <label>Upload Photo (optional)</label>
            <input type="file" id="complaintPhoto" accept="image/*">
          </div>
          <button type="submit" class="btn btn-primary">Submit Complaint</button>
        </form>
        <hr>
        <h3>Recent Complaints</h3>
        <div class="table-responsive">
          <table id="complaintsTable">
            <thead>
              <tr><th>ID</th><th>Title</th><th>Status</th><th>Date</th> </tr>
            </thead>
            <tbody id="complaintsList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script>
    const user = JSON.parse(sessionStorage.getItem('user'));

    document.getElementById('complaintForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!user) { alert('Please login'); return; }

      const title = document.getElementById('complaintTitle').value.trim();
      const description = document.getElementById('complaintDesc').value.trim();
      if (!title || !description) {
        alert('Please enter title and description');
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      formData.append('description', description);
      formData.append('user_id', user.id);
      const photoFile = document.getElementById('complaintPhoto').files[0];
      if (photoFile) formData.append('photo', photoFile);

      try {
        const response = await fetch('http://localhost:5000/api/complaints', {
          method: 'POST',
          body: formData
        });
        if (response.ok) {
          alert('Complaint submitted!');
          document.getElementById('complaintForm').reset();
          loadComplaints();
        } else {
          const err = await response.json();
          alert('Submission failed: ' + (err.error || 'Unknown error'));
        }
      } catch (err) {
        console.error(err);
        alert('Network error. Is backend running?');
      }
    });

    async function loadComplaints() {
      if (!user) return;
      try {
        const response = await fetch(`http://localhost:5000/api/complaints?user_id=${user.id}`);
        const complaints = await response.json();
        const tbody = document.getElementById('complaintsList');
        if (complaints.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4">No complaints found.</td></tr>';
          return;
        }
        tbody.innerHTML = complaints.map(c => `
          <tr>
            <td>${c.id}</td>
            <td>${c.title}</td>
            <td>${c.status}</td>
            <td>${new Date(c.created_at).toLocaleDateString('en-IN')}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadComplaints);
  </script>
</body>
</html>
