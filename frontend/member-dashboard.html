<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanByte - Member Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="user-info">
        <div class="user-icon" id="userIcon"></div>
        <div class="user-name" id="userName"></div>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" onclick="location.href='member-dashboard.html'">🏠 Home</button>
        <button class="nav-btn" onclick="location.href='profile.html'">👤 Profile</button>
        <button class="nav-btn" onclick="location.href='complaint.html'">📝 Complaint Registration</button>
        <button class="nav-btn" onclick="location.href='management-details.html'">📋 Management Details</button>
        <button class="nav-btn" onclick="location.href='polls-forum.html'">📊 Polls & Forum</button>
        <button class="nav-btn" onclick="location.href='society-details.html'">🏘️ Society Details</button>
        <button class="nav-btn" onclick="location.href='contact-management.html'">📞 Contact Management</button>
        <button class="nav-btn" onclick="location.href='emergency-contact.html'">🚨 Emergency Contact</button>
        <button class="nav-btn" onclick="location.href='guest-parcel.html'">📦 Guest/Parcel Info</button>
        <button class="nav-btn" onclick="location.href='payment.html'">💳 Payment Page</button>
        <button class="nav-btn" onclick="location.href='documents.html'">📄 Document Details</button>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="welcome-box">
        <h2>Welcome, <span id="welcomeName"></span>!</h2>
        <p>Flat: <span id="welcomeFlat"></span></p>
      </div>

      <div class="priority-box">
        <h3>🔔 Priority Notifications</h3>
        <div id="notificationsList"></div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/shared.js"></script>
  <script>
    // Load user name and flat from session (already in shared.js)
    document.addEventListener('DOMContentLoaded', async function() {
      const user = JSON.parse(sessionStorage.getItem('user'));
      if (user) {
        document.getElementById('welcomeName').textContent = user.name || 'Member';
        document.getElementById('welcomeFlat').textContent = user.flat || 'N/A';
        await loadNotifications(user.id);
      }
    });

    async function loadNotifications(userId) {
      const container = document.getElementById('notificationsList');
      container.innerHTML = '<p>Loading...</p>';
      try {
        const response = await fetch(`http://localhost:5000/api/complaints?user_id=${userId}`);
        if (!response.ok) throw new Error('Failed to fetch');
        const complaints = await response.json();
        if (complaints.length === 0) {
          container.innerHTML = '<p>No recent complaints.</p>';
          return;
        }
        // Show up to 5 most recent complaints
        container.innerHTML = complaints.slice(0, 5).map(c => `
          <div class="notification-item ${c.status === 'pending' ? 'priority-high' : (c.status === 'in_progress' ? 'priority-medium' : '')}">
            <span class="date">${new Date(c.created_at).toLocaleDateString('en-IN')}</span>
            <span><strong>${c.title}</strong> - Status: ${c.status}</span>
          </div>
        `).join('');
      } catch (err) {
        console.error('Error loading notifications:', err);
        container.innerHTML = '<p>Could not load notifications. Make sure backend is running.</p>';
      }
    }
  </script>
</body>
</html>
